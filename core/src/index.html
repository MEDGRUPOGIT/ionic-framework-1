<!DOCTYPE html>
<html dir="ltr" lang="en" class="dark-mode">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Stencil Component Starter</title>

    <!-- <script type="module" src="./build/ionic.esm.js"></script>
    <script nomodule src="./build/ionic.js"></script> -->

    <link href="./css/ionic.bundle.css" rel="stylesheet">
    <link href="./src/stories/assets/fsemeric.css" rel="stylesheet">
    <link href="../css/medsoft.css" rel="stylesheet">
    <script nomodule src="./dist/ionic/ionic.js"></script>
    <script type="module" src="./dist/ionic/ionic.esm.js"></script></head>
    <script type="module">
      import { modalController } from 'https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/index.esm.js';
      window.modalController = modalController;
    </script>
      <script type="module">
        import { toastController } from 'https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/index.esm.js';
        window.toastController = toastController;
      </script>
    <style>
      :root {
        --ion-font-family: 'fsemeric';
      }

      body {
        font-family: 'fsemeric';
        font-weight: 400;
      }

      .dark-mode ion-content {
        --background: #141414;
      }

      .light-mode ion-content {
        --background: #fafafa;
      }


      .med-accordion-header {
        display: flex;
        align-items: center;
        width: 100%;
      }

      .med-accordion-header__heading {
        font-size: var(--med-font-size-xs);
        font-weight: var(--med-font-weight-semibold);
        line-height: var(--med-line-height-default);
        color: var(--med-color-neutral-10);
        margin: 0;
        padding: 0;
        width: 100%;
        text-align: center;
      }

      .monta-provas-accordion__button {
        --font-size: 24px;
        --padding: 0;
        --width: 24px;
        --height: 24px;
      }

      .monta-provas-chart {
        background: var(--med-color-neutral-2);
        padding: 0 var(--med-spacing-stretch-md);
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        max-width: 400px;
        margin: 0 auto;
      }

      .monta-provas-chart__total {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        line-height: var(--med-line-height-compressed);
        text-align: center;
      }

      .monta-provas-chart__label {
        font-size: var(--med-font-size-nano);
        color: var(--med-color-neutral-dark-10);
        font-weight: var(--med-font-weight-bold);
      }

      .monta-provas-chart__number {
        font-weight: var(--med-font-weight-bold);
        font-size: var(--med-font-size-md);
        color: var(--med-color-neutral-10);
      }

      .med-context-menu__list {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .med-context-menu__item {
        padding-right: var(--med-spacing-inline-xs);
        margin-bottom: var(--med-spacing-stack-base);
        font-size: var(--med-font-size-xs);
        line-height: var(--med-line-height-compressed);
        color: var(--med-color-neutral-3);
        display: flex;
        align-items: center;
      }

      .med-context-menu__icon {
        padding-right: var(--med-spacing-inline-xxxs);
        width: 24px;
        height: 24px;
      }

      .med-context-menu__info {
        padding: 0;
        margin: 0;
        font-size: var(--med-font-size-xs);
        line-height: var(--med-line-height-compressed);
        color: var(--med-color-neutral-5);
        padding: var(--med-spacing-inset-xs) 0;
        text-align: center;
      }
    </style>
  </head>
  <body class="dark-mode">
    <ion-app>

      <med-context-menu class="med-context-menu">
        <ul class="med-context-menu__list">
          <li class="med-context-menu__item">
            <ion-icon class="med-icon med-context-menu__icon" name="med-filtro"></ion-icon>
            <span>Ver filtro selecionado</span>
          </li>
          <li class="med-context-menu__item">
            <ion-icon class="med-icon med-context-menu__icon" name="med-editar"></ion-icon>
            <span>Renomear Prova</span>
          </li>
          <li class="med-context-menu__item">
            <ion-icon class="med-icon med-context-menu__icon" name="med-lixeira"></ion-icon>
            <span>Excluir Prova</span>
          </li>
        </ul>
        <p class="med-context-menu__info">Criada em 30/12/2020</p>
      </med-context-menu>
    </div>

    </ion-app>

    <script>
      const comp = document.querySelector('med-context-menu');

      const compItem = document.querySelector('.med-context-menu__item');

      compItem.addEventListener('click', () => {
        comp.collapsed = true;
      })

    </script>
  </body>
</html>
